services:
  app:
    image: ghcr.io/${GH_OWNER}/jules-orchestrator:latest
    environment:
      - GH_CLIENT_ID=${GH_CLIENT_ID}
      - GH_SECRET=${GH_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    networks:
      - caddy_network
    deploy:
      labels:
        caddy: ${DOMAIN}
        caddy.reverse_proxy: "{{upstreams 3000}}"
      restart_policy:
        condition: on-failure

networks:
  caddy_network:
    external: true
