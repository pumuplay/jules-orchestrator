# Production mode docker-compose file for Portainer
services:
  app:
    image: jules-orchestrator:latest
    build:
      context: ..
      dockerfile: gitops/Dockerfile
    environment:
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    networks:
      - caddy_network
    deploy:
      labels:
        caddy: ${DOMAIN}
        caddy.reverse_proxy: "{{upstreams 3000}}"
      restart_policy:
        condition: on-failure

networks:
  caddy_network:
    external: true
